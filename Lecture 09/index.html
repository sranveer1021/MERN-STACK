<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Event Registration</h2>
    <form>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" >
        <br>
        <br>


        <label for="emailid">Email id:</label>
        <input type="email" name="emailid" id="emailid">
        <br>
        <br>

        <label for="phoneno">Phone No:</label>
        <input type="tel" id="phoneno" name="phoneno" >
        <br>
        <br>

        <label for="OccupationType">Occupation:</label>
        <select name="OccuptionTyoe" id="OccupationType">
            <option value="Student">Student</option>
            <option value="professional">professional</option>
            <option value="other">Other</option>
        </select>
        <br>
        <br>

        <fieldset>

            <legend>Topic of Interest</legend>

            <label for="checkbox1">HTML</label>
            <input type="checkbox" id="checkbox1" name="checkbox1">

            <label for="checkbox2">CSS</label>
            <input type="checkbox" id="checkbox2" name="checkbox2">

            <label for="checkbox3">Javascript</label>
            <input type="checkbox" id="checkbox3" name="checkbox3">


        </fieldset>

        <label for="textarea1">Comment:</label>
        <br>
        <textarea name="textarea1" id="textarea1" cols="10px" rows="10px"></textarea>

        <input type="submit" value="Register">


        


    </form>




</body>
</html>
