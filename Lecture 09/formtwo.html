<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=h2>, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Job Application</h2>
    <form>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name">
        <br>
        <br>

        <label for="emailID">Email ID:</label>
        <input type="email" id="emailID" name="emailID">
        <br>
        <br>

        <label for="phonenumber">Phone No:</label>
        <input type="tel" id="phonenumber" name="phonenumber">
        <br>
        <br>

        <label for="fileupload">Resume</label>
        <input type="file" name="fileupload" id="fileupload">
        <br>
        <br>
         
        <label for="counter">Experience (inyears):</label>
        <input type="number" name="counter" id="counter" min="0" max="50">
        <br>
        <br>


        <fieldset>
            <legend>Skills</legend>
            <input type="checkbox" id="checkbox1" name="checkbox1">
            <label for="checkbox1">HTML</label>

            <input type="checkbox" id="checkbox2" name="checkbox2">
            <label for="checkbox2">CSS</label>

            <input type="checkbox" id="checkbox3" name="checkbox3">
            <label for="checkbox3">Javascript</label>
        </fieldset>
        <br>

        <label for="educationType">Higher Education:</label>
        <select name="eductionType" id="eductionType">
            <option value="High School">High School</option>
            <option value="Associate Degree">Associate degree</option>
            <option value="Bachelor Degree">Bachelor Degree</option>
            <option value="Master's Dergee">Master's Degree</option>
            <option value="phd">PHD</option>
        </select>
        <br/>

        <fieldset>
            <legend>Availability:</legend>

            <label for="radio1">Full-Time</label>
            <input type="radio" name="radio" id="radio1">
            <br/>

            <label for="radio1">Part-time</label>
            <input type="radio" name="radio" id="radio2">
            <br>
        </fieldset>

        <label for="textarea1">Additional Comment:</label>
        <br>
        <textarea name="textarea1" id="textarea1" cols="30" rows="10"></textarea>
        <br>

        <input type="submit" value="Submit Application">

    </form>
</body>
</html>
